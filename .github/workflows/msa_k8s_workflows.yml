name: deploy order

on:
  push:
    branches:
      - main 


jobs:
  
  # job name
  build-and-deploy:
    
    # runner
    runs-on: ubuntu-latest

    # https://docs.github.com/ko/actions
    steps:
      - name: checkout github
        uses: actions/checkout@v2

      # 리눅스 환경에서 kubectl client 설치
      - name: install kubectl
        uses: azure/setup-kubectl@v3
        with:
            version: "v1.34.1"

      # aws 인증
      - name: aws configure
        uses: aws-actions/configure-aws-credentials@v1
        with:
            aws-access-key-id: ${{ secrets.AWS_KEY }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET }}
            aws-region: us-east-2
    
       # EKS 클러스터 연결
      - name: aws eks cluster update
        run: aws eks update-kubeconfig --region ap-northeast-2 --name lgcns-gyubs-cluster

      - name: aws ecr login
        uses: aws-actions/amazon-ecr-login@v1

      # infra 구축(ingress, kafka, redis, zookeeper, rabbitMQ)
      - name: deploy infra
        run: |
          kubectl apply -f ./k8s/msa-ingress.yaml
          kubectl apply -f ./k8s/msa-zookeeper.yaml
          kubectl apply -f ./k8s/msa-kafka.yaml
          kubectl apply -f ./k8s/msa-redis.yaml