# msa - k8s - aws version
# eks 배포시 apigateway 는 eureka
eureka:
  client:
    enabled: false

spring:
  application:
    name: user-service

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:3306/inspire?useSSL=true&requireSSL=true  
    username: ${DB_ADMIN}  
    password: ${DB_PASSWORD}

  data:
    redis:
      # pod 실행중인 redis server 이름으로 변경
      host: redis-service
      port: 6379
      password: 
      timeout: 6000ms

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate: 
      ddl-auto: create
    show-sql: true

jwt:
  secret: jslim-super-secret-key-for-jwt-123456789