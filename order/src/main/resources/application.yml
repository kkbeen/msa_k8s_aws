# msa - k8s - aws version
# eks 배포시 apigateway 는 eureka server 등록하지 않겠다라는 의미
eureka:
  client:
    enabled: false


spring:
  application:
    name: product-service
  
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:3306/inspire?useSSL=true&requireSSL=true
    username: ${DB_ADMIN}
    password: ${DB_PASSWORD}

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate:
      ddl-auto: create
    show-sql: true

  kafka:
    # pod 실행중인 service 이름으로 변경 (localhost X)
    kafka-server: kafka-service:9092

# Feign + CircuitBreaker 활성화
feign:
  circuitbreaker:
    enabled: true

# Feign + CircuitBreaker 트랜젝션 처리
resilience4j:
  circuitbreaker:
    instances:
      productService:
        failure-rate-threshold: 40
        wait-duration-in-open-state: 10s